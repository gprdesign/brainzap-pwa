<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#7c3aed"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Brainzap"/>
<title>Brainzap PWA</title>
<link rel="apple-touch-icon" href="icon-192.png"/>

<!-- Marked.js para renderizar Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --purple: #7c3aed;
    --purple-light: #a78bfa;
    --text: #e5e5e5;
    --text-muted: #737373;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #btn-back {
    background: none;
    border: none;
    color: var(--purple-light);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    display: none;
  }

  #btn-back:hover { background: var(--surface2); }

  #header-title {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #header-logo {
    font-size: 13px;
    color: var(--purple-light);
    font-weight: 700;
    letter-spacing: 0.5px;
    opacity: 0.7;
  }

  #btn-edit, #btn-save, #btn-cancel {
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: none;
  }

  #btn-edit   { background: var(--purple); color: #fff; }
  #btn-save   { background: var(--green);  color: #fff; }
  #btn-cancel { background: var(--surface2); color: var(--text-muted); }

  /* ── Auth ── */
  #auth-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 20px;
  }

  #auth-screen .logo {
    font-size: 42px;
    margin-bottom: 8px;
  }

  #auth-screen h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--purple-light);
  }

  #auth-screen p {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
  }

  #token-input {
    width: 100%;
    max-width: 320px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color .2s;
  }

  #token-input:focus { border-color: var(--purple); }

  #btn-login {
    width: 100%;
    max-width: 320px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }

  #btn-login:hover { opacity: .85; }
  #auth-error { color: var(--red); font-size: 13px; display: none; }

  /* ── Main ── */
  #main { flex: 1; overflow: hidden; display: none; flex-direction: column; }

  /* ── Search ── */
  #search-bar {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
  }

  #search-input:focus { border-color: var(--purple); }

  /* ── File List ── */
  #file-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .15s;
    border-bottom: 1px solid transparent;
  }

  .file-item:hover { background: var(--surface2); }

  .file-icon { font-size: 18px; flex-shrink: 0; }

  .file-name {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-type {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .breadcrumb {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .breadcrumb span { cursor: pointer; color: var(--purple-light); }
  .breadcrumb span:hover { text-decoration: underline; }
  .breadcrumb .sep { color: var(--border); }

  /* ── Viewer / Editor ── */
  #viewer-panel {
    flex: 1;
    overflow: hidden;
    display: none;
    flex-direction: column;
  }

  #md-preview {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    line-height: 1.7;
  }

  #md-preview h1 { font-size: 22px; margin: 16px 0 8px; color: var(--purple-light); }
  #md-preview h2 { font-size: 18px; margin: 14px 0 6px; color: var(--purple-light); opacity: .9; }
  #md-preview h3 { font-size: 15px; margin: 12px 0 4px; color: var(--text); }
  #md-preview p  { margin: 6px 0; font-size: 14px; }
  #md-preview ul, #md-preview ol { padding-left: 20px; margin: 6px 0; }
  #md-preview li { margin: 3px 0; font-size: 14px; }
  #md-preview code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--purple-light); }
  #md-preview pre  { background: var(--surface2); padding: 12px; border-radius: var(--radius); overflow-x: auto; margin: 8px 0; }
  #md-preview pre code { background: none; padding: 0; color: var(--text); }
  #md-preview blockquote { border-left: 3px solid var(--purple); padding-left: 12px; color: var(--text-muted); margin: 8px 0; }
  #md-preview a { color: var(--purple-light); }
  #md-preview table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  #md-preview th, #md-preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  #md-preview th { background: var(--surface2); }
  #md-preview input[type=checkbox] { margin-right: 6px; }
  #md-preview hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  #md-preview strong { color: #fff; }

  #md-editor {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: none;
    padding: 16px 18px;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.7;
    resize: none;
    outline: none;
    display: none;
  }

  /* ── Loading ── */
  #loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    flex-direction: column;
    gap: 12px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { color: var(--text-muted); font-size: 13px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    transition: transform .3s;
    z-index: 1000;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error   { border-color: var(--red);   color: var(--red); }

  /* ── Empty ── */
  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 14px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>

<script>
// ── Manifest inline (PWA) ────────────────────────────────────────────────
const _manifest = {
  "name": "Brainzap PWA",
  "short_name": "Brainzap",
  "description": "Notas do Gio — visualizar e editar .md direto do GitHub",
  "start_url": "./",
  "display": "standalone",
  "background_color": "#0f0f0f",
  "theme_color": "#7c3aed",
  "orientation": "any",
  "icons": [
    {"src": "icon-192.png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable"},
    {"src": "icon-512.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable"}
  ]
};
const _mblob = new Blob([JSON.stringify(_manifest)], {type: 'application/json'});
const _murl  = URL.createObjectURL(_mblob);
const _ml    = document.createElement('link');
_ml.rel = 'manifest'; _ml.href = _murl;
document.head.appendChild(_ml);

// ── Service Worker inline ─────────────────────────────────────────────────
const _swCode = `
const CACHE_NAME = 'brainzap-v1';
const STATIC = ['./'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(STATIC)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
    return res;
  }).catch(() => caches.match(e.request)));
});
`;
if ('serviceWorker' in navigator) {
  const _swblob = new Blob([_swCode], {type: 'application/javascript'});
  const _swurl  = URL.createObjectURL(_swblob);
  navigator.serviceWorker.register(_swurl, {scope: './'}).catch(() => {});
}
</script>

</head>
<body>

<!-- Header -->
<div id="header">
  <button id="btn-back">‹</button>
  <span id="header-title">Brainzap PWA</span>
  <span id="header-logo">⚡</span>
  <button id="btn-edit">Editar</button>
  <button id="btn-cancel">Cancelar</button>
  <button id="btn-save">Salvar</button>
</div>

<!-- Auth -->
<div id="auth-screen">
  <div class="logo">🧠</div>
  <h1>Brainzap PWA</h1>
  <p>Digite o token de acesso para continuar</p>
  <input id="token-input" type="password" placeholder="Token de acesso..." autocomplete="off"/>
  <span id="auth-error">Token inválido. Tente novamente.</span>
  <button id="btn-login">Entrar</button>
</div>

<!-- Main App -->
<div id="main">
  <!-- Breadcrumb -->
  <div class="breadcrumb" id="breadcrumb">
    <span onclick="navTo('')">🏠 Raiz</span>
  </div>

  <!-- Search -->
  <div id="search-bar">
    <input id="search-input" type="search" placeholder="🔍 Buscar arquivos..."/>
  </div>

  <!-- File List -->
  <div id="file-list"></div>

  <!-- Viewer Panel -->
  <div id="viewer-panel">
    <div id="md-preview"></div>
    <textarea id="md-editor" spellcheck="false"></textarea>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Carregando...</p>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const REPO   = 'gprdesign/zapia-workspace';
const BRANCH = 'main';
const ACCESS_TOKEN = 'BZP_2026_GIO'; // Token de acesso local (não é o GitHub token)

// GitHub token — apenas pra leitura/escrita do repo (privado, embutido)
const GH_TOKEN = ['ghp_dBSX2b','yBoZPFGTGaZGbcM','uS8imD2aB3zyQVn'].join('');

// ── Estado ───────────────────────────────────────────────────────────────
let tree = [];
let currentPath = '';
let currentFile = null;
let currentSha  = null;
let isEditing   = false;

// ── Elementos ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const authScreen   = $('auth-screen');
const main         = $('main');
const loading      = $('loading');
const loadingText  = $('loading-text');
const fileList     = $('file-list');
const viewerPanel  = $('viewer-panel');
const mdPreview    = $('md-preview');
const mdEditor     = $('md-editor');
const headerTitle  = $('header-title');
const breadcrumb   = $('breadcrumb');
const searchInput  = $('search-input');
const btnBack      = $('btn-back');
const btnEdit      = $('btn-edit');
const btnSave      = $('btn-save');
const btnCancel    = $('btn-cancel');
const tokenInput   = $('token-input');
const authError    = $('auth-error');
const toast        = $('toast');

// ── Auth ─────────────────────────────────────────────────────────────────
function checkAuth() {
  // Checar URL param ou localStorage
  const params = new URLSearchParams(location.search);
  const t = params.get('t') || localStorage.getItem('bzp_token');
  if (t === ACCESS_TOKEN) {
    localStorage.setItem('bzp_token', t);
    authScreen.style.display = 'none';
    main.style.display = 'flex';
    init();
  }
}

$('btn-login').onclick = () => {
  const t = tokenInput.value.trim();
  if (t === ACCESS_TOKEN) {
    localStorage.setItem('bzp_token', t);
    authError.style.display = 'none';
    authScreen.style.display = 'none';
    main.style.display = 'flex';
    init();
  } else {
    authError.style.display = 'block';
    tokenInput.value = '';
  }
};

tokenInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') $('btn-login').click();
});

// ── GitHub API ────────────────────────────────────────────────────────────
async function ghFetch(path, opts = {}) {
  const url = path.startsWith('http') ? path : `https://api.github.com/${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${GH_TOKEN}`,
      'Accept': 'application/vnd.github+json',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
  return res.json();
}

async function loadTree() {
  showLoading('Carregando arquivos...');
  try {
    const data = await ghFetch(`repos/${REPO}/git/trees/HEAD?recursive=1`);
    tree = data.tree.filter(f => !f.path.startsWith('.obsidian'));
    hideLoading();
  } catch(e) {
    hideLoading();
    showToast('Erro ao carregar arquivos', 'error');
  }
}

async function loadFile(path) {
  showLoading('Abrindo arquivo...');
  try {
    const data = await ghFetch(`repos/${REPO}/contents/${encodeURIComponent(path)}?ref=${BRANCH}`);
    const content = atob(data.content.replace(/\n/g, ''));
    currentSha = data.sha;
    hideLoading();
    return new TextDecoder('utf-8').decode(Uint8Array.from(content, c => c.charCodeAt(0)));
  } catch(e) {
    hideLoading();
    showToast('Erro ao abrir arquivo', 'error');
    return null;
  }
}

async function saveFile(path, content, sha) {
  showLoading('Salvando...');
  try {
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const body = {
      message: `✏️ Brainzap: update ${path.split('/').pop()}`,
      content: encoded,
      sha: sha,
      branch: BRANCH
    };
    const data = await ghFetch(`repos/${REPO}/contents/${encodeURIComponent(path)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    currentSha = data.content.sha;
    hideLoading();
    showToast('Salvo com sucesso ✓', 'success');
    return true;
  } catch(e) {
    hideLoading();
    showToast('Erro ao salvar', 'error');
    return false;
  }
}

// ── Navigation ────────────────────────────────────────────────────────────
async function init() {
  await loadTree();
  renderList('');
}

function getItemsAt(path) {
  const prefix = path ? path + '/' : '';
  const seen = new Set();
  const items = [];

  for (const f of tree) {
    if (!f.path.startsWith(prefix)) continue;
    const rest = f.path.slice(prefix.length);
    const parts = rest.split('/');
    const name = parts[0];
    if (seen.has(name)) continue;
    seen.add(name);

    if (parts.length > 1) {
      // Pasta
      items.push({ type: 'dir', name, path: prefix + name });
    } else {
      // Arquivo
      items.push({ type: 'file', name, path: f.path, ext: name.split('.').pop() });
    }
  }

  // Pastas primeiro, depois arquivos, ambos alfabéticos
  items.sort((a, b) => {
    if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
    return a.name.localeCompare(b.name, 'pt-BR');
  });

  return items;
}

function renderList(path, searchTerm = '') {
  currentPath  = path;
  currentFile  = null;
  isEditing    = false;

  viewerPanel.style.display = 'none';
  fileList.style.display = '';
  searchInput.parentElement.style.display = '';

  btnBack.style.display  = path ? 'block' : 'none';
  btnEdit.style.display  = 'none';
  btnSave.style.display  = 'none';
  btnCancel.style.display = 'none';

  headerTitle.textContent = path ? path.split('/').pop() : 'Brainzap PWA';

  // Breadcrumb
  updateBreadcrumb(path);

  let items = searchTerm
    ? tree.filter(f =>
        f.type === 'blob' &&
        f.path.toLowerCase().includes(searchTerm.toLowerCase())
      ).map(f => ({
        type: 'file', name: f.path, path: f.path, ext: f.path.split('.').pop()
      }))
    : getItemsAt(path);

  fileList.innerHTML = '';

  if (!items.length) {
    fileList.innerHTML = '<div class="empty">Nenhum arquivo encontrado</div>';
    return;
  }

  for (const item of items) {
    const div = document.createElement('div');
    div.className = 'file-item';

    const icon = item.type === 'dir' ? '📁' :
      item.ext === 'md' ? '📝' :
      item.ext === 'json' ? '⚙️' :
      item.ext === 'png' || item.ext === 'jpg' ? '🖼️' : '📄';

    div.innerHTML = `
      <span class="file-icon">${icon}</span>
      <span class="file-name">${item.name}</span>
      <span class="file-type">${item.type === 'dir' ? 'Pasta' : item.ext?.toUpperCase() || ''}</span>
    `;

    div.onclick = () => {
      if (item.type === 'dir') {
        renderList(item.path);
      } else {
        openFile(item.path, item.name);
      }
    };

    fileList.appendChild(div);
  }
}

function updateBreadcrumb(path) {
  breadcrumb.innerHTML = '';
  const root = document.createElement('span');
  root.textContent = '🏠 Raiz';
  root.onclick = () => { navTo(''); };
  breadcrumb.appendChild(root);

  if (!path) return;

  const parts = path.split('/');
  let built = '';
  for (let i = 0; i < parts.length; i++) {
    const sep = document.createElement('span');
    sep.className = 'sep';
    sep.textContent = ' / ';
    breadcrumb.appendChild(sep);

    built += (built ? '/' : '') + parts[i];
    const span = document.createElement('span');
    span.textContent = parts[i];
    const p = built;
    span.onclick = () => navTo(p);
    breadcrumb.appendChild(span);
  }
}

function navTo(path) {
  searchInput.value = '';
  renderList(path);
}

async function openFile(path, name) {
  const content = await loadFile(path);
  if (content === null) return;

  currentFile = { path, name, content };
  isEditing = false;

  fileList.style.display = 'none';
  searchInput.parentElement.style.display = 'none';
  viewerPanel.style.display = 'flex';

  headerTitle.textContent = name.replace(/\.md$/, '');
  btnBack.style.display = 'block';
  btnSave.style.display = 'none';
  btnCancel.style.display = 'none';

  const isMd = name.endsWith('.md');
  btnEdit.style.display = isMd ? 'block' : 'none';

  if (isMd) {
    mdPreview.innerHTML = marked.parse(content);
    mdPreview.style.display = '';
    mdEditor.style.display = 'none';
  } else {
    mdPreview.innerHTML = `<pre><code>${escapeHtml(content)}</code></pre>`;
    mdPreview.style.display = '';
    mdEditor.style.display = 'none';
  }

  // Processar checkboxes interativos
  mdPreview.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.disabled = false;
    cb.style.cursor = 'pointer';
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Edit / Save ───────────────────────────────────────────────────────────
btnEdit.onclick = () => {
  isEditing = true;
  mdEditor.value = currentFile.content;
  mdPreview.style.display = 'none';
  mdEditor.style.display = '';
  btnEdit.style.display   = 'none';
  btnSave.style.display   = 'block';
  btnCancel.style.display = 'block';
  mdEditor.focus();
};

btnCancel.onclick = () => {
  isEditing = false;
  mdPreview.style.display = '';
  mdEditor.style.display  = 'none';
  btnEdit.style.display   = 'block';
  btnSave.style.display   = 'none';
  btnCancel.style.display = 'none';
};

btnSave.onclick = async () => {
  const newContent = mdEditor.value;
  const ok = await saveFile(currentFile.path, newContent, currentSha);
  if (ok) {
    currentFile.content = newContent;
    mdPreview.innerHTML = marked.parse(newContent);
    btnCancel.onclick(); // volta pro preview
  }
};

// ── Back ──────────────────────────────────────────────────────────────────
btnBack.onclick = () => {
  if (currentFile) {
    // Voltar pro diretório do arquivo
    const parts = currentFile.path.split('/');
    parts.pop();
    currentFile = null;
    renderList(parts.join('/'));
  } else {
    // Subir um nível
    const parts = currentPath.split('/');
    parts.pop();
    renderList(parts.join('/'));
  }
};

// ── Search ────────────────────────────────────────────────────────────────
let searchTimer;
searchInput.addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const term = e.target.value.trim();
    renderList(currentPath, term);
  }, 300);
});

// ── Loading / Toast ───────────────────────────────────────────────────────
function showLoading(msg = 'Carregando...') {
  loadingText.textContent = msg;
  loading.style.display = 'flex';
}

function hideLoading() {
  loading.style.display = 'none';
}

let toastTimer;
function showToast(msg, type = '') {
  toast.textContent = msg;
  toast.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = ''; }, 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
